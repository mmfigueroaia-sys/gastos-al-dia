<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0e1016" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gastos al día" />
  <title>Gastos al día</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e1016;
      --surface: #171b24;
      --surface2: #1e2230;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #eef0f6;
      --text2: rgba(238,240,246,0.45);
      --text3: rgba(238,240,246,0.22);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ── VIGNETTE ── */
    .vignette {
      position: fixed;
      inset: 0;
      background: rgba(200,40,40,0.1);
      pointer-events: none;
      opacity: 0;
      z-index: 100;
    }

    /* ── HEADER ── */
    .header {
      padding: 3.5rem 0 1.6rem;
      text-align: center;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
      position: relative;
      user-select: none;
    }

    /* ── MODE SELECTOR ── */
    .mode-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-bottom: 0.55rem;
    }

    .mode-label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .mode-arrow {
      font-size: 13px;
      color: var(--text3);
      cursor: pointer;
      padding: 3px 5px;
      transition: color 0.15s;
      line-height: 1;
    }
    .mode-arrow:hover { color: var(--text2); }

    .total {
      font-size: clamp(48px, 14vw, 64px);
      font-weight: 200;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      color: #dde0ea;
      display: inline-block;
    }

    .month-label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.04em;
      margin-top: 7px;
    }

    .past-badge {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text3);
      text-transform: uppercase;
      margin-top: 3px;
      display: none;
    }

    .progress-bar {
      height: 1.5px;
      background: rgba(255,255,255,0.05);
      margin: 14px 1.5rem 0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.5s;
    }

    /* ── NAV ARROWS ── */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-55%);
      font-size: 20px;
      color: var(--text3);
      cursor: pointer;
      padding: 16px;
      transition: color 0.15s;
      line-height: 1;
    }
    .nav-arrow:hover { color: var(--text2); }
    .nav-arrow.disabled { opacity: 0.1; pointer-events: none; }
    .nav-arrow.prev { left: 0; }
    .nav-arrow.next { right: 0; }

    /* ── HISTORY ── */
    .history {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .history::-webkit-scrollbar { width: 2px; }
    .history::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .hist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.8rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
    }
    .hist-item:last-child { border-bottom: none; }

    .hist-icon {
      font-size: 15px;
      width: 34px;
      height: 34px;
      background: var(--surface);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 0.5px solid var(--border2);
    }

    .hist-cat {
      font-size: 11px;
      color: var(--text2);
    }

    .hist-desc {
      font-size: 11px;
      color: var(--text2);
      cursor: pointer;
      transition: color 0.15s;
      min-width: 60px;
      flex-shrink: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    .hist-desc:hover { color: var(--text); }

    .desc-edit {
      background: none;
      border: none;
      border-bottom: 0.5px solid var(--border2);
      color: var(--text);
      font-size: 11px;
      font-family: inherit;
      width: 120px;
      outline: none;
      padding: 0 0 1px;
    }

    .hist-amount {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .hist-time {
      font-size: 10px;
      color: var(--text3);
    }

    .hist-right {
      margin-left: auto;
      text-align: right;
      flex-shrink: 0;
    }

    .hist-delete {
      font-size: 16px;
      color: var(--text3);
      cursor: pointer;
      padding: 4px 0 4px 8px;
      transition: color 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .hist-delete:hover { color: #c44; }

    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
    }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 1rem 1.25rem calc(1rem + env(safe-area-inset-bottom));
      border-top: 0.5px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .cat-toggle {
      width: 46px;
      height: 46px;
      border-radius: 13px;
      border: 0.5px solid var(--border2);
      background: var(--surface2);
      cursor: pointer;
      font-size: 19px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      user-select: none;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      transition: opacity 0.15s;
    }
    .cat-toggle:active { opacity: 0.6; }
    .cat-toggle.static { cursor: default; }
    .cat-toggle.static:active { opacity: 1; }

    .amount-input {
      flex: 1;
      height: 46px;
      padding: 0 1rem;
      border: 0.5px solid var(--border2);
      border-radius: 13px;
      background: var(--surface2);
      color: var(--text);
      font-size: 17px;
      font-family: inherit;
      min-width: 0;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .amount-input:focus { border-color: rgba(255,255,255,0.25); }
    .amount-input::placeholder { color: var(--text3); }
    .amount-input:disabled { opacity: 0.35; }

    .cargar-btn {
      height: 46px;
      padding: 0 1.3rem;
      border-radius: 13px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      color: #fff;
      flex-shrink: 0;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      transition: transform 0.1s, opacity 0.2s;
    }
    .cargar-btn:active { transform: scale(0.97); }
    .cargar-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── ANIMATIONS ── */
    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-7px); }
      30%  { transform: translateX(7px); }
      45%  { transform: translateX(-5px); }
      60%  { transform: translateX(4px); }
      75%  { transform: translateX(-2px); }
      90%  { transform: translateX(1px); }
      100% { transform: translateX(0); }
    }
    @keyframes punch {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.16); }
      65%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }
    @keyframes vignette-in {
      0%   { opacity: 0; }
      25%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slide-in-left {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes item-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .shake  { animation: shake 0.5s ease; }
    .punch  { animation: punch 0.4s ease; }
    .vig-on { animation: vignette-in 0.65s ease forwards; }
    .slide-r { animation: slide-in-right 0.22s ease both; }
    .slide-l { animation: slide-in-left 0.22s ease both; }
    .item-in { animation: item-in 0.28s ease; }
  </style>
</head>
<body>

<div class="vignette" id="vig"></div>

<div class="app">

  <!-- HEADER -->
  <div class="header" id="header">
    <span class="nav-arrow prev" id="prevBtn" onclick="changeMonth(-1)">‹</span>
    <span class="nav-arrow next" id="nextBtn" onclick="changeMonth(1)">›</span>
    <div class="mode-selector">
      <span class="mode-arrow" onclick="changeMode(-1)">‹</span>
      <span class="mode-label" id="modeLabel">Gastos del mes</span>
      <span class="mode-arrow" onclick="changeMode(1)">›</span>
    </div>
    <div class="total" id="total">$0</div>
    <div class="month-label" id="monthLabel"></div>
    <div class="past-badge" id="pastBadge">mes anterior</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history" id="history">
    <div class="empty-state" id="emptyState">sin gastos aún</div>
  </div>

  <!-- INPUT BAR -->
  <div class="input-bar">
    <div class="input-row">
      <button class="cat-toggle" id="catToggle" onclick="handleCatToggle()">🛒</button>
      <input
        class="amount-input"
        id="amountInput"
        type="number"
        inputmode="numeric"
        placeholder="$ monto"
        min="1"
        onkeydown="if(event.key==='Enter') cargar()"
      />
      <button class="cargar-btn" id="cargarBtn" onclick="cargar()">Cargar</button>
    </div>
  </div>

</div>

<script>
  // ── STATE ──────────────────────────────────────────────
  const now      = new Date();
  const TODAY_Y  = now.getFullYear();
  const TODAY_M  = now.getMonth();
  let viewYear   = TODAY_Y;
  let viewMonth  = TODAY_M;
  let viewMode   = 0;
  let catIdx     = 0;
  let animRaf    = null;

  const MAX       = 150000;
  const MAX_SALDO = 500000;
  const CATS      = [{ name: 'Mercado', e: '🛒' }, { name: 'Verdura', e: '🥦' }];
  const MESES     = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const MODES     = ['Gastos del mes', 'Pagos con tarjeta', 'Saldo disponible'];
  const PREFIXES  = ['gastos', 'tarjeta', 'ingresos'];

  // ── STORAGE ────────────────────────────────────────────
  function getData(prefix, y, m) {
    try {
      const raw = localStorage.getItem(`${prefix}_${y}_${m}`);
      return raw ? JSON.parse(raw) : { total: 0, items: [] };
    } catch { return { total: 0, items: [] }; }
  }

  function saveData(prefix, y, m, data) {
    try { localStorage.setItem(`${prefix}_${y}_${m}`, JSON.stringify(data)); } catch {}
  }

  // ── COLOR ──────────────────────────────────────────────
  function lerp(a, b, t) { return a + (b - a) * t; }
  function lerp3(c1, c2, t) {
    return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)];
  }

  function getColor(v) {
    const p  = Math.min(v / MAX, 1);
    const pl = [210, 212, 222];
    const go = [194, 148, 72];
    const cr = [196, 68, 68];
    const rgb = p < 0.5 ? lerp3(pl, go, p * 2) : lerp3(go, cr, (p - 0.5) * 2);
    return `rgb(${Math.round(rgb[0])},${Math.round(rgb[1])},${Math.round(rgb[2])})`;
  }

  function getColorSaldo(v) {
    if (v <= 0) return 'rgb(196,68,68)';
    const p   = Math.min(v / MAX_SALDO, 1);
    const red = [196, 68, 68];
    const ora = [194, 148, 72];
    const grn = [72, 168, 100];
    const rgb = p < 0.5 ? lerp3(red, ora, p * 2) : lerp3(ora, grn, (p - 0.5) * 2);
    return `rgb(${Math.round(rgb[0])},${Math.round(rgb[1])},${Math.round(rgb[2])})`;
  }

  function colorFn(v) {
    return viewMode === 2 ? getColorSaldo(v) : getColor(v);
  }

  // ── FORMAT ─────────────────────────────────────────────
  function fmt(n) {
    const r = Math.round(n);
    if (r < 0) return '-$' + Math.abs(r).toLocaleString('es-AR');
    return '$' + r.toLocaleString('es-AR');
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function fmtTime(t) { return pad(t.getHours()) + ':' + pad(t.getMinutes()); }

  // ── EASING ─────────────────────────────────────────────
  function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }

  // ── DISPLAY TOTAL ──────────────────────────────────────
  function getDisplayTotal() {
    if (viewMode === 2) {
      const ing = getData('ingresos', viewYear, viewMonth);
      const gas = getData('gastos',   viewYear, viewMonth);
      return ing.total - gas.total;
    }
    return getData(PREFIXES[viewMode], viewYear, viewMonth).total;
  }

  // ── ANIMATE COUNT ──────────────────────────────────────
  function animateCount(from, to, duration) {
    if (animRaf) cancelAnimationFrame(animRaf);
    let start = null;
    const el  = document.getElementById('total');
    const btn = document.getElementById('cargarBtn');
    function step(ts) {
      if (!start) start = ts;
      const t   = Math.min((ts - start) / duration, 1);
      const cur = from + (to - from) * easeOutExpo(t);
      el.textContent       = fmt(cur);
      el.style.color       = colorFn(cur);
      btn.style.background = colorFn(cur);
      if (t < 1) {
        animRaf = requestAnimationFrame(step);
      } else {
        el.textContent = fmt(to);
        el.style.color = colorFn(to);
      }
    }
    animRaf = requestAnimationFrame(step);
  }

  // ── EFFECTS ────────────────────────────────────────────
  function triggerPain() {
    const app = document.querySelector('.app');
    const tot = document.getElementById('total');
    const vig = document.getElementById('vig');
    app.classList.remove('shake');
    tot.classList.remove('punch');
    vig.classList.remove('vig-on');
    void app.offsetWidth;
    app.classList.add('shake');
    tot.classList.add('punch');
    vig.classList.add('vig-on');
    setTimeout(() => {
      app.classList.remove('shake');
      tot.classList.remove('punch');
      vig.classList.remove('vig-on');
    }, 700);
  }

  function triggerPunch() {
    const tot = document.getElementById('total');
    tot.classList.remove('punch');
    void tot.offsetWidth;
    tot.classList.add('punch');
    setTimeout(() => tot.classList.remove('punch'), 500);
  }

  // ── CATEGORY ───────────────────────────────────────────
  function toggleCat() {
    catIdx = catIdx === 0 ? 1 : 0;
    document.getElementById('catToggle').textContent = CATS[catIdx].e;
  }

  function handleCatToggle() {
    if (viewMode !== 2) toggleCat();
  }

  // ── MODE ───────────────────────────────────────────────
  function changeMode(dir) {
    viewMode = (viewMode + dir + 3) % 3;
    document.getElementById('modeLabel').textContent = MODES[viewMode];
    renderView();
  }

  // ── CARGAR ─────────────────────────────────────────────
  function cargar() {
    if (!isCurrentMonth()) return;
    const val = parseFloat(document.getElementById('amountInput').value);
    if (!val || val <= 0) return;

    const prefix   = PREFIXES[viewMode];
    const prevDisp = getDisplayTotal();
    const data     = getData(prefix, viewYear, viewMonth);

    data.total += val;
    if (viewMode === 2) {
      data.items.unshift({ desc: 'Toca para editar', amount: val, t: new Date().toISOString() });
    } else {
      data.items.unshift({ cat: catIdx, amount: val, t: new Date().toISOString() });
    }
    saveData(prefix, viewYear, viewMonth, data);

    document.getElementById('amountInput').value = '';
    const newDisp = getDisplayTotal();
    updateBar(newDisp);
    renderHistory(null, data);

    if (viewMode === 2) {
      triggerPunch();
    } else {
      triggerPain();
    }

    animateCount(prevDisp, newDisp, 620);
  }

  // ── DELETE ITEM ────────────────────────────────────────
  function deleteItem(idx) {
    const prefix   = PREFIXES[viewMode];
    const prevDisp = getDisplayTotal();
    const data     = getData(prefix, viewYear, viewMonth);
    const amount   = data.items[idx].amount;

    data.items.splice(idx, 1);
    data.total = Math.max(0, data.total - amount);
    saveData(prefix, viewYear, viewMonth, data);

    const newDisp = getDisplayTotal();
    updateBar(newDisp);
    renderHistory(null, data);
    animateCount(prevDisp, newDisp, 500);
  }

  // ── EDIT DESCRIPTION (modo 2) ──────────────────────────
  function editDesc(idx, el) {
    if (el.querySelector('input')) return;
    const current = el.textContent.trim();
    const inp     = document.createElement('input');
    inp.type        = 'text';
    inp.value       = current === 'Toca para editar' ? '' : current;
    inp.placeholder = 'Descripción...';
    inp.className   = 'desc-edit';
    el.textContent  = '';
    el.appendChild(inp);
    inp.focus();
    inp.select();

    function save() {
      const val  = inp.value.trim() || 'Toca para editar';
      const data = getData('ingresos', viewYear, viewMonth);
      if (data.items[idx]) {
        data.items[idx].desc = val;
        saveData('ingresos', viewYear, viewMonth, data);
      }
      el.textContent = val;
    }

    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter')  inp.blur();
      if (e.key === 'Escape') el.textContent = current;
    });
  }

  // ── MONTH NAVIGATION ───────────────────────────────────
  function isCurrentMonth() {
    return viewYear === TODAY_Y && viewMonth === TODAY_M;
  }

  function changeMonth(dir) {
    let m = viewMonth + dir;
    let y = viewYear;
    if (m < 0)  { m = 11; y--; }
    if (m > 11) { m = 0;  y++; }
    if (y > TODAY_Y || (y === TODAY_Y && m > TODAY_M)) return;
    viewMonth = m;
    viewYear  = y;
    renderView(dir > 0 ? 'r' : 'l');
  }

  // ── RENDER ─────────────────────────────────────────────
  function renderView(slide) {
    const prefix = PREFIXES[viewMode];
    const data   = getData(prefix, viewYear, viewMonth);
    const cur    = isCurrentMonth();
    const disp   = getDisplayTotal();

    if (animRaf) cancelAnimationFrame(animRaf);

    const totEl = document.getElementById('total');
    totEl.textContent = fmt(disp);
    totEl.style.color = colorFn(disp);

    document.getElementById('monthLabel').textContent = `${MESES[viewMonth]} ${viewYear}`;
    document.getElementById('pastBadge').style.display = cur ? 'none' : 'block';

    const btn = document.getElementById('cargarBtn');
    btn.disabled = !cur;
    btn.style.background = colorFn(cur ? disp : 0);

    const inp = document.getElementById('amountInput');
    inp.disabled    = !cur;
    inp.placeholder = cur ? '$ monto' : 'solo lectura';

    const catBtn = document.getElementById('catToggle');
    if (viewMode === 2) {
      catBtn.textContent = '💰';
      catBtn.classList.add('static');
    } else {
      catBtn.textContent = CATS[catIdx].e;
      catBtn.classList.remove('static');
    }

    document.getElementById('nextBtn').classList.toggle('disabled', cur);
    document.getElementById('emptyState').textContent =
      viewMode === 2 ? 'sin ingresos aún' : 'sin gastos aún';

    updateBar(disp);
    renderHistory(slide, data);
  }

  function updateBar(disp) {
    const max  = viewMode === 2 ? MAX_SALDO : MAX;
    const pct  = viewMode === 2
      ? Math.max(0, Math.min(disp / max * 100, 100))
      : Math.min(disp / max * 100, 100);
    const fill = document.getElementById('progressFill');
    fill.style.width      = pct + '%';
    fill.style.background = colorFn(disp);
  }

  function renderHistory(slide, data) {
    const hist    = document.getElementById('history');
    const emptyEl = document.getElementById('emptyState');
    hist.querySelectorAll('.hist-item').forEach(el => el.remove());

    if (!data || data.items.length === 0) {
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';

    const frag = document.createDocumentFragment();
    data.items.forEach((h, i) => {
      const d   = document.createElement('div');
      let cls   = 'hist-item';
      if (slide === 'r')      cls += ' slide-r';
      else if (slide === 'l') cls += ' slide-l';
      else if (i === 0)       cls += ' item-in';
      d.className = cls;
      if (slide) d.style.animationDelay = (i * 0.025) + 's';

      const t = new Date(h.t);

      if (viewMode === 2) {
        d.innerHTML = `
          <div class="hist-icon">💰</div>
          <div class="hist-desc" onclick="editDesc(${i}, this)">${h.desc || 'Toca para editar'}</div>
          <div class="hist-right">
            <div class="hist-amount">${fmt(h.amount)}</div>
            <div class="hist-time">${fmtTime(t)}</div>
          </div>
          <div class="hist-delete" onclick="deleteItem(${i})">×</div>
        `;
      } else {
        d.innerHTML = `
          <div class="hist-icon">${CATS[h.cat].e}</div>
          <div class="hist-cat">${CATS[h.cat].name}</div>
          <div class="hist-right">
            <div class="hist-amount">${fmt(h.amount)}</div>
            <div class="hist-time">${fmtTime(t)}</div>
          </div>
          <div class="hist-delete" onclick="deleteItem(${i})">×</div>
        `;
      }
      frag.appendChild(d);
    });
    hist.appendChild(frag);
  }

  // ── SWIPE ──────────────────────────────────────────────
  let touchStartX = 0;
  const header = document.getElementById('header');
  header.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  header.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 45) changeMonth(dx < 0 ? 1 : -1);
  }, { passive: true });

  // ── SERVICE WORKER ─────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // ── INIT ───────────────────────────────────────────────
  renderView();
</script>
</body>
</html>
